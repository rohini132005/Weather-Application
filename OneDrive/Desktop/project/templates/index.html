<!DOCTYPE html>
<html>
<head>
    <title>IR Ranking System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #1e3c72;
        }

        form {
            text-align: center;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 70%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: #1e3c72;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #16325c;
        }

        .result-card {
            background: #f4f6f9;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 5px solid #1e3c72;
            transition: transform 0.2s ease;
        }

        .result-card:hover {
            transform: scale(1.02);
        }

        .score {
            color: #2a5298;
            font-weight: bold;
        }

        .no-result {
            text-align: center;
            color: red;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔎 Information Retrieval Ranking System</h2>

    <form method="POST">
        <input type="text" name="query" placeholder="Enter your search query..." required>
        <button type="submit">Search</button>
    </form>

    {% if results %}
        {% for result in results %}
            {% if result.score > 0 %}
            <div class="result-card">
                <div class="score">Score: {{ "%.4f"|format(result.score) }}</div>
                <div>{{ result.document }}</div>
            </div>
            {% endif %}
        {% endfor %}
    {% else %}
       {% if message %}
    <div class="no-result">{{ message }}</div>
{% endif %}
    {% endif %}

    <footer>
         Machine Learning Based IR System
    </footer>
</div>

</body>
</html>
